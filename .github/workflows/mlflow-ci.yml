name: MLflow Project CI

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
  workflow_dispatch:

concurrency:
  group: mlflow-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12.7"
          activate-environment: mlflow-ci-env

      - name: Install MLflow
        shell: bash -l {0}
        run: pip install mlflow==2.19.0

      - name: Run MLflow Project
        shell: bash -l {0}
        working-directory: MLProject
        run: mlflow run . --env-manager=conda --experiment-name "Telco Customer Churn - Workflow CI"

      - name: Capture run ID
        id: capture_run_id
        run: echo "run_id=$(cat MLProject/run_id.txt)" >> "$GITHUB_OUTPUT"

      - name: Commit and push training artifacts
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns/
          git diff --staged --quiet || git commit -m "chore: save CI training artifacts [skip ci]"
          git pull --rebase origin main
          git push

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with MLflow
        shell: bash -l {0}
        working-directory: MLProject
        run: |
          mlflow models build-docker -m "runs:/${{ steps.capture_run_id.outputs.run_id }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model" --env-manager conda


      - name: Push Docker image to Docker Hub
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model"


      

